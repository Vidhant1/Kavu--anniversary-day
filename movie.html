<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Our Movie 🎬</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Cormorant+Garamond:ital,wght@0,500;0,600;1,400&family=EB+Garamond:ital,wght@0,400;1,400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body class="page-movie">

  <canvas id="petal-canvas"></canvas>

  <audio id="bg-music" loop>
    <source src="music/Those Eyes - NEW WEST.mp3" type="audio/mpeg">
  </audio>
  <button id="music-toggle" title="Toggle music">🔊</button>

  <main class="movie-stage">
    <h1 class="section-title light">Our Little Movie</h1>
    <p class="section-sub light-sub">Sit back, my love. This one's for us.</p>

    <div class="cinema">
      <div class="screen-frame">
        <!-- Replace src with your own video file -->
        <video id="our-movie" controls poster="">
          <source src="assets/our-movie.mp4" type="video/mp4">
        </video>
      </div>
      <!-- Curtains -->
      <div class="curtain curtain-left"></div>
      <div class="curtain curtain-right"></div>
      <div class="curtain-valance"></div>
    </div>

    <div id="final-message" class="final-message">
      <h2 class="section-title">And So Our Story Continues...</h2>
      <p>Happy Anniversary, my love. Here's to every chapter still unwritten.</p>
      <div class="infinity">♥ ∞ ♥</div>
    </div>
  </main>

  <script src="script.js"></script>
</body>
</html>
